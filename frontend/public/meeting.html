<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalpvriksha Meeting</title>
  <script src="https://unpkg.com/livekit-client/dist/livekit-client.umd.min.js"></script>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#0f172a;color:#fff;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;height:100vh;overflow:hidden}.app{height:100vh;display:flex;flex-direction:column}.topbar{height:56px;background:#1e293b;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid rgba(255,255,255,.08)}.title{font-weight:900;font-size:14px}.status{font-size:11px;color:#cbd5e1;font-weight:700}.grid{flex:1;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px;padding:10px;overflow:auto}.tile{position:relative;background:#111827;border:1px solid rgba(255,255,255,.08);border-radius:18px;overflow:hidden;min-height:220px;display:flex;align-items:center;justify-content:center}.tile video{width:100%;height:100%;object-fit:cover}.placeholder{width:92px;height:92px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#4f46e5;font-size:30px;font-weight:900}.name{position:absolute;left:10px;bottom:10px;background:rgba(15,23,42,.82);padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800}.controls{height:76px;background:#111827;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;gap:10px;padding:10px}.btn{border:0;border-radius:14px;padding:12px 14px;font-weight:900;color:#fff;background:#334155;cursor:pointer}.btn:hover{background:#475569}.btn.active{background:#4f46e5}.btn.danger{background:#ef4444}.btn.screen{background:#0f766e}.err{padding:16px;margin:16px;border-radius:18px;background:#7f1d1d;color:#fecaca;font-weight:800;line-height:1.45}.hidden{display:none}@media(max-width:700px){.topbar{height:auto;min-height:58px;align-items:flex-start;flex-direction:column;padding:10px 12px}.grid{grid-template-columns:1fr;padding:8px}.tile{min-height:250px}.controls{height:auto;flex-wrap:wrap;gap:8px}.btn{flex:1 1 42%;padding:12px 10px;font-size:12px}}
  </style>
</head>
<body>
<div class="app">
  <div class="topbar"><div><div class="title" id="title">Kalpvriksha Meeting</div><div class="status" id="status">Connecting...</div></div><button class="btn danger" onclick="leaveMeeting()">Leave</button></div>
  <div id="error" class="err hidden"></div>
  <div class="grid" id="grid"></div>
  <div class="controls">
    <button class="btn" id="micBtn" onclick="toggleMic()">🎤 Mic</button>
    <button class="btn" id="camBtn" onclick="toggleCam()">📷 Camera</button>
    <button class="btn screen" id="screenBtn" onclick="toggleScreen()">🖥️ Share Screen</button>
  </div>
</div>
<script>
const params = new URLSearchParams(location.search);
const roomName = params.get('room') || 'kalpvriksha-meeting';
const displayName = params.get('name') || 'Kalpvriksha User';
const mode = params.get('mode') || 'video';
const apiBase = (params.get('api') || '').replace(/\/$/, '') || location.origin;
const LK = window.LivekitClient || window.LiveKitClient || window.livekitClient;
let room;
let micEnabled = mode !== 'screen';
let camEnabled = mode === 'video';
let screenEnabled = false;
const grid = document.getElementById('grid');
const statusEl = document.getElementById('status');
document.getElementById('title').textContent = `${mode === 'screen' ? 'Screen Share' : mode === 'audio' ? 'Audio Call' : 'Video Meeting'} • ${roomName}`;
function initials(name){return String(name||'U').split(/\s+/).filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase() || 'U'}
function showError(msg){document.getElementById('error').classList.remove('hidden');document.getElementById('error').textContent=msg;statusEl.textContent='Error';}
function tileId(id){return 'tile_'+String(id).replace(/[^a-zA-Z0-9_-]/g,'_')}
function ensureTile(id,name){let t=document.getElementById(tileId(id));if(!t){t=document.createElement('div');t.className='tile';t.id=tileId(id);t.innerHTML=`<div class="placeholder">${initials(name)}</div><div class="name">${name||id}</div>`;grid.appendChild(t);}return t}
function attachTrack(track, id, name){const t=ensureTile(id,name);const existing=t.querySelector(`[data-track="${track.sid}"]`);if(existing)return;const el=track.attach();el.dataset.track=track.sid;el.autoplay=true;el.playsInline=true;t.appendChild(el);}
function detachTrack(track){track.detach().forEach(el=>el.remove())}
function renderParticipant(p){ensureTile(p.identity,p.name||p.identity);p.trackPublications.forEach(pub=>{if(pub.track)attachTrack(pub.track,p.identity,p.name||p.identity)})}
async function connect(){
  try{
    if(!LK) throw new Error('LiveKit client could not be loaded. Check internet connection or CDN access.');
    const res=await fetch(`${apiBase}/api/meetings/token`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({room:roomName,name:displayName,identity:displayName})});
    const data=await res.json();
    if(!res.ok||!data.token) throw new Error(data.error||'Unable to get meeting token');
    room=new LK.Room({adaptiveStream:true,dynacast:true});
    room.on(LK.RoomEvent.TrackSubscribed,(track,pub,p)=>attachTrack(track,p.identity,p.name||p.identity));
    room.on(LK.RoomEvent.TrackUnsubscribed,(track)=>detachTrack(track));
    room.on(LK.RoomEvent.ParticipantConnected,p=>renderParticipant(p));
    room.on(LK.RoomEvent.ParticipantDisconnected,p=>{const el=document.getElementById(tileId(p.identity)); if(el)el.remove();});
    room.on(LK.RoomEvent.Disconnected,()=>statusEl.textContent='Disconnected');
    await room.connect(data.url,data.token);
    statusEl.textContent='Connected';
    ensureTile(room.localParticipant.identity, displayName+' (You)');
    await room.localParticipant.setMicrophoneEnabled(micEnabled);
    await room.localParticipant.setCameraEnabled(camEnabled);
    for(const p of room.remoteParticipants.values()) renderParticipant(p);
    updateButtons();
    if(mode==='screen') setTimeout(()=>toggleScreen(),600);
  }catch(e){console.error(e);showError(e.message||'Meeting failed to start');}
}
function updateButtons(){document.getElementById('micBtn').classList.toggle('active',micEnabled);document.getElementById('camBtn').classList.toggle('active',camEnabled);document.getElementById('screenBtn').classList.toggle('active',screenEnabled)}
async function toggleMic(){if(!room)return;micEnabled=!micEnabled;await room.localParticipant.setMicrophoneEnabled(micEnabled);updateButtons()}
async function toggleCam(){if(!room)return;camEnabled=!camEnabled;await room.localParticipant.setCameraEnabled(camEnabled);updateButtons()}
async function toggleScreen(){if(!room)return;try{screenEnabled=!screenEnabled;await room.localParticipant.setScreenShareEnabled(screenEnabled);updateButtons()}catch(e){screenEnabled=false;updateButtons();alert('Screen sharing is not available or permission was denied. On mobile browsers, screen sharing may not be supported.')}}
function leaveMeeting(){try{room&&room.disconnect()}catch(e){}; window.close(); statusEl.textContent='Left meeting'}
connect();
</script>
</body>
</html>
